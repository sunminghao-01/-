// ============================================================
// STATS
// ============================================================
const benkeList   = U.filter(u => u.type === "本科");
const zhuankeList = U.filter(u => u.type === "专科");
const specialList = U.filter(u => u.type === "校区");
document.getElementById("count-benke").textContent  = benkeList.length;
document.getElementById("count-zhuanke").textContent = zhuankeList.length;
document.getElementById("count-total").textContent   = U.length;

// ============================================================
// MAP
// ============================================================
const map = L.map("map", { center: [36.1, 118.05], zoom: 7, zoomControl: true });

const gaodeTile = L.tileLayer("https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}", {
    subdomains: "1234", attribution: "&copy; <a href='https://www.amap.com/'>高德地图</a>", maxZoom: 18,
});
const osmTile = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    subdomains: "abc", attribution: "&copy; <a href='https://www.openstreetmap.org/'>OpenStreetMap</a>", maxZoom: 19,
});
gaodeTile.addTo(map);

L.control.layers({ "高德地图 (推荐)": gaodeTile, "OpenStreetMap": osmTile }, null, { position: "topleft" }).addTo(map);

// ============================================================
// MARKERS
// ============================================================
const markerCluster = L.markerClusterGroup({
    maxClusterRadius: 38,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    zoomToBoundsOnClick: true,
    disableClusteringAtZoom: 14,
});

const allMarkers = [];

function getMarkerColor(type) {
    if (type === "本科") return "#3388ff";
    if (type === "校区") return "#e74c3c";
    return "#2ecc71"; // 专科
}

function createCustomIcon(color, size, type) {
    const borderColor = type === "校区" ? "#c0392b" : (type === "本科" ? "#2563d6" : "#27ae60");
    const glow = type === "校区" ? "0 0 10px rgba(231,76,60,0.7)" : "0 2px 6px rgba(0,0,0,0.25)";
    return L.divIcon({
        className: "custom-marker",
        html: `<div style="width:${size*2}px;height:${size*2}px;background:${color};border:3px solid ${borderColor};border-radius:50%;box-shadow:${glow};cursor:pointer;transition:transform 0.15s;"></div>`,
        iconSize: [size*2, size*2], iconAnchor: [size, size], popupAnchor: [0, -size],
    });
}

function createPopup(uni) {
    const showName = uni.campus ? `${uni.name}（${uni.campus}）` : uni.name;
    const typeLabel = uni.type === "本科" ? "公办本科" : uni.type === "专科" ? "公办专科" : "分校区";
    const typeClass = uni.type === "本科" ? "popup-type-benke" : uni.type === "专科" ? "popup-type-zhuanke" : "popup-type-zhongde";
    const noteHtml = uni.note ? `<div style="color:#888;font-size:12px;margin-top:2px;">${uni.note}</div>` : "";
    const addrHtml = uni.addr ? `<div style="color:#555;font-size:12px;margin-top:2px;">📍 ${uni.addr}</div>` : "";
    const mainTag = uni.isMain ? "" : ` <span style="font-size:10px;color:#999;">(分校区)</span>`;
    return `<div class="popup-name">${showName}${mainTag}</div>
            <div class="popup-city">${uni.city}市</div>
            <span class="popup-type ${typeClass}">${typeLabel}</span>${noteHtml}${addrHtml}`;
}

U.forEach((uni) => {
    const color = getMarkerColor(uni.type);
    const size  = uni.type === "校区" ? 13 : (uni.isMain ? 11 : 8);
    const icon  = createCustomIcon(color, size, uni.type);
    const marker = L.marker([uni.lat, uni.lng], { icon });
    marker.bindPopup(createPopup(uni));
    marker.university = uni;
    markerCluster.addLayer(marker);
    allMarkers.push({ marker, university: uni });
});

map.addLayer(markerCluster);
const bounds = L.latLngBounds([34.5, 114.8], [38.0, 122.8]);
map.fitBounds(bounds);

// ============================================================
// SIDEBAR
// ============================================================
const sidebar = document.getElementById("sidebar"), sidebarToggle = document.getElementById("sidebarToggle");
const searchInput = document.getElementById("searchInput"), resultList = document.getElementById("resultList");
const cityFiltersEl = document.getElementById("cityFilters"), clearCityBtn = document.getElementById("clearCity");
const typeFiltersEl = document.getElementById("typeFilters");
let activeType = null, activeCity = null, searchQuery = "";

// City list
const cities = [...new Set(U.map(u => u.city))].sort();
cities.forEach(city => {
    const chip = document.createElement("span");
    chip.className = "city-chip"; chip.textContent = city;
    chip.addEventListener("click", () => {
        if (activeCity === city) { activeCity = null; cityFiltersEl.querySelectorAll(".city-chip").forEach(c => c.classList.remove("active")); }
        else { activeCity = city; cityFiltersEl.querySelectorAll(".city-chip").forEach(c => c.classList.remove("active")); chip.classList.add("active"); }
        applyFilters();
    });
    cityFiltersEl.appendChild(chip);
});
clearCityBtn.addEventListener("click", (e) => { e.preventDefault(); activeCity = null; cityFiltersEl.querySelectorAll(".city-chip").forEach(c => c.classList.remove("active")); applyFilters(); });

// Type filter
typeFiltersEl.addEventListener("click", (e) => {
    const chip = e.target.closest(".type-chip"); if (!chip) return;
    chip.classList.toggle("active-benke"); chip.classList.toggle("active-zhuanke");
    const benkeActive = typeFiltersEl.querySelector('[data-type="benke"]').classList.contains("active-benke");
    const zhuankeActive = typeFiltersEl.querySelector('[data-type="zhuanke"]').classList.contains("active-zhuanke");
    if (benkeActive && zhuankeActive) activeType = null;
    else if (benkeActive) activeType = "benke";
    else if (zhuankeActive) activeType = "zhuanke";
    else { typeFiltersEl.querySelector('[data-type="benke"]').classList.add("active-benke"); typeFiltersEl.querySelector('[data-type="zhuanke"]').classList.add("active-zhuanke"); activeType = null; }
    applyFilters();
});

searchInput.addEventListener("input", () => { searchQuery = searchInput.value.trim().toLowerCase(); applyFilters(); });

function matchesType(uni) {
    if (activeType === null) return true;
    if (activeType === "benke") return uni.type === "本科" || uni.type === "校区";
    if (activeType === "zhuanke") return uni.type === "专科";
    return true;
}

function applyFilters() {
    const filtered = U.filter(uni => {
        if (activeCity && uni.city !== activeCity) return false;
        if (!matchesType(uni)) return false;
        if (searchQuery) {
            const showName = uni.campus ? `${uni.name}（${uni.campus}）` : uni.name;
            if (!showName.toLowerCase().includes(searchQuery) && !uni.city.toLowerCase().includes(searchQuery) && !(uni.campus && uni.campus.toLowerCase().includes(searchQuery))) return false;
        }
        return true;
    });
    renderList(filtered);
    updateMarkers(filtered);
}

function renderList(filtered) {
    resultList.innerHTML = "";
    if (filtered.length === 0) { resultList.innerHTML = '<div class="no-results">😕 没有找到匹配的院校</div>'; return; }
    const cnt = document.createElement("div");
    cnt.style.cssText = "padding:4px 12px 8px;font-size:11px;color:#7f8fa6;"; cnt.textContent = `共 ${filtered.length} 个标记点`;
    resultList.appendChild(cnt);
    filtered.forEach(uni => {
        const item = document.createElement("div"); item.className = "result-item";
        let bc = "badge-benke", bt = "本科"; if (uni.type === "专科") { bc = "badge-zhuanke"; bt = "专科"; } if (uni.type === "校区") { bc = "badge-zhongde"; bt = "校区"; }
        const showName = uni.campus ? `${uni.name}·${uni.campus}` : uni.name;
        const subTag = uni.isMain ? "" : ` <span style="font-size:10px;color:#888;">分校区</span>`;
        item.innerHTML = `<span class="badge ${bc}">${bt}</span><div class="info"><div class="name">${showName}${subTag}</div><div class="city">${uni.city}市${uni.addr?" · "+uni.addr:""}</div></div>`;
        item.addEventListener("click", () => {
            map.flyTo([uni.lat, uni.lng], 15, { duration: 0.8 });
            const found = allMarkers.find(m => m.university === uni);
            if (found) setTimeout(() => found.marker.openPopup(), 900);
        });
        resultList.appendChild(item);
    });
}

function updateMarkers(filtered) {
    const fs = new Set(filtered);
    markerCluster.clearLayers();
    allMarkers.forEach(({ marker, university }) => { if (fs.has(university)) markerCluster.addLayer(marker); });
}

applyFilters();

// Sidebar toggle
let sidebarOpen = true;
sidebarToggle.addEventListener("click", () => {
    sidebarOpen = !sidebarOpen;
    if (sidebarOpen) { sidebar.classList.remove("collapsed"); sidebarToggle.textContent = "◀"; sidebarToggle.style.left = "360px"; }
    else { sidebar.classList.add("collapsed"); sidebarToggle.textContent = "▶"; sidebarToggle.style.left = "0"; }
    setTimeout(() => map.invalidateSize(), 350);
});
window.addEventListener("resize", () => map.invalidateSize());

console.log("✅ 山东省高校地图加载完成 (含各校区)！");
console.log(`   总标记: ${U.length} | 本科: ${benkeList.length} | 专科: ${zhuankeList.length} | 特标: ${specialList.length}`);
})();
</script>
